<div class="container_vertical gap-1">
  <div class="font-size-3">Прогресс: {{progress}}%</div>
  <div class="progress-bar">
    <div class="progress-bar-fill" [style.width.%]="progress"></div>
  </div>
  <input type="range" [ngModel]="progress" (ngModelChange)="progress = $event" min="0" max="100" />
</div>
